{% extends "base/layout.html" %}

{% block content %}
  <form class="card compact-password-form" method="post" autocomplete="off">
    {% csrf_token %}
    {{ form.non_field_errors }}
    <label>Login {{ form.username }}</label>
    <label>Nova Senha {{ form.new_password1 }} {{ form.new_password1.errors }}</label>
    <label>Confirmar Senha {{ form.new_password2 }} {{ form.new_password2.errors }}</label>
  </form>
{% endblock %}
