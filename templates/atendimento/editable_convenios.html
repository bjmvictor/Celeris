{% extends "base/layout.html" %}

{% block content %}
  <form class="card table-card" data-editable-table data-table="convenio" method="post">
    {% csrf_token %}
    <table class="editable-table">
      <thead><tr>
        <th><a href="?q={{ request.GET.q|urlencode }}&ordem={% if request.GET.ordem == 'cd_convenio' %}-{% endif %}cd_convenio">Código</a></th>
        <th><a href="?q={{ request.GET.q|urlencode }}&ordem={% if request.GET.ordem == 'nm_convenio' %}-{% endif %}nm_convenio">Convênio</a></th>
        <th><a href="?q={{ request.GET.q|urlencode }}&ordem={% if request.GET.ordem == 'sn_ativo' %}-{% endif %}sn_ativo">Status</a></th>
      </tr></thead>
      <tbody>
        {% for registro in registros %}
          <tr data-editable-row>
            <td>
              <input value="{{ registro.cd_convenio }}" readonly data-primary-key="true">
              <input data-row-delete name="delete_{{ registro.pk }}" type="hidden" value="0">
            </td>
            <td><input name="name_{{ registro.pk }}" value="{{ registro.nm_convenio }}" required></td>
            <td>
              <select name="active_{{ registro.pk }}">
                <option value="true" {% if registro.sn_ativo %}selected{% endif %}>Ativo</option>
                <option value="false" {% if not registro.sn_ativo %}selected{% endif %}>Inativo</option>
              </select>
            </td>
          </tr>
        {% empty %}
          <tr><td colspan="3" class="empty-cell">Nenhum dado encontrado.</td></tr>
        {% endfor %}
      </tbody>
    </table>
    <template data-table-new-row>
      <tr data-editable-row>
        <td><input readonly placeholder="Automático" data-primary-key="true"></td>
        <td><input name="new_name" placeholder="Convênio" required></td>
        <td>
          <select name="new_active">
            <option value="true" selected>Ativo</option>
            <option value="false">Inativo</option>
          </select>
        </td>
      </tr>
    </template>
    {% include "components/table_pager.html" %}
  </form>
{% endblock %}
