{% extends "base/layout.html" %}

{% block content %}
  <form class="card form-grid" data-table="core_screendefinition" data-preserve-input method="post">
    {% csrf_token %}
    {{ form.non_field_errors }}
    {% for field in form %}
      <label{% if field.name == "description" %} class="span-2"{% endif %}>
        {{ field.label }}
        {{ field }}
        {{ field.errors }}
      </label>
    {% endfor %}
  </form>
{% endblock %}
