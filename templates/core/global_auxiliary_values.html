{% extends "base/layout.html" %}

{% block content %}
  <form class="card table-card" data-editable-table data-table="valor_auxiliar_global" method="post">
    {% csrf_token %}
    <table class="editable-table">
      <thead>
        <tr><th>Código</th><th>Descrição</th><th>Grupo/UF</th><th>Status</th></tr>
      </thead>
      <tbody>
        {% for valor in valores %}
          <tr data-editable-row>
            <td>
              <input name="code_{{ valor.pk }}" value="{{ valor.cd_valor }}">
              <input data-row-delete name="delete_{{ valor.pk }}" type="hidden" value="0">
            </td>
            <td><input name="description_{{ valor.pk }}" value="{{ valor.ds_valor }}"></td>
            <td><input name="group_{{ valor.pk }}" value="{{ valor.ds_grupo }}"></td>
            <td>
              <select name="active_{{ valor.pk }}">
                <option value="true" {% if valor.sn_ativo %}selected{% endif %}>Ativo</option>
                <option value="false" {% if not valor.sn_ativo %}selected{% endif %}>Inativo</option>
              </select>
            </td>
          </tr>
        {% empty %}
          <tr><td colspan="4" class="empty-cell">Nenhum valor cadastrado. Clique em + para adicionar.</td></tr>
        {% endfor %}
      </tbody>
    </table>
    <template data-table-new-row>
      <tr data-editable-row>
        <td><input name="new_code" placeholder="Código"></td>
        <td><input name="new_description" placeholder="Descrição"></td>
        <td><input name="new_group" placeholder="Grupo/UF"></td>
        <td>
          <select name="new_active">
            <option value="true" selected>Ativo</option>
            <option value="false">Inativo</option>
          </select>
        </td>
      </tr>
    </template>
  </form>
{% endblock %}
