{% extends "base/layout.html" %}

{% block content %}
  <section class="card table-card">
    <table>
      <thead>
        <tr><th>ID</th><th>Descrição</th><th>Status</th><th>Criado em</th></tr>
      </thead>
      <tbody>
        {% for row in rows %}
          <tr>
            <td>{{ row.id }}</td>
            <td>{{ row }}</td>
            <td>{{ row.status|default:"-" }}</td>
            <td>{{ row.created_at|date:"d/m/Y H:i" }}</td>
          </tr>
        {% empty %}
          <tr><td colspan="4" class="empty-cell">Nenhum registro encontrado.</td></tr>
        {% endfor %}
      </tbody>
    </table>
  </section>
{% endblock %}
