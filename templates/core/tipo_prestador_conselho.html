{% extends "base/layout.html" %}

{% block content %}
  <form class="card table-card" data-editable-table data-table="tipo_prestador_conselho" method="post">
    {% csrf_token %}
    <table class="editable-table">
      <thead><tr>
        <th><a href="?q={{ request.GET.q|urlencode }}&ordem={% if request.GET.ordem == 'id' %}-{% endif %}id">Código</a></th>
        <th><a href="?q={{ request.GET.q|urlencode }}&ordem={% if request.GET.ordem == 'tp_prestador' %}-{% endif %}tp_prestador">Tipo de prestador</a></th>
        <th><a href="?q={{ request.GET.q|urlencode }}&ordem={% if request.GET.ordem == 'ds_conselho' %}-{% endif %}ds_conselho">Conselho</a></th>
        <th><a href="?q={{ request.GET.q|urlencode }}&ordem={% if request.GET.ordem == 'sn_ativo' %}-{% endif %}sn_ativo">Status</a></th>
      </tr></thead>
      <tbody>
        {% for registro in registros %}
          <tr data-editable-row>
            <td>
              <input value="{{ registro.pk }}" readonly data-primary-key="true">
              <input data-row-delete name="delete_{{ registro.pk }}" type="hidden" value="0">
            </td>
            <td>
              <select name="type_{{ registro.pk }}" required>
                {% for tipo in tipos %}
                  <option value="{{ tipo.cd_valor }}" {% if tipo.cd_valor == registro.tp_prestador %}selected{% endif %}>{{ tipo.ds_valor }}</option>
                {% endfor %}
              </select>
            </td>
            <td><input name="council_{{ registro.pk }}" value="{{ registro.ds_conselho }}" maxlength="20" required></td>
            <td>
              <select name="active_{{ registro.pk }}">
                <option value="true" {% if registro.sn_ativo %}selected{% endif %}>Ativo</option>
                <option value="false" {% if not registro.sn_ativo %}selected{% endif %}>Inativo</option>
              </select>
            </td>
          </tr>
        {% empty %}
          <tr><td colspan="4" class="empty-cell">Nenhum vínculo cadastrado.</td></tr>
        {% endfor %}
      </tbody>
    </table>
    <template data-table-new-row>
      <tr data-editable-row>
        <td><input readonly placeholder="Automático" data-primary-key="true"></td>
        <td>
          <select name="new_type" required>
            <option value=""></option>
            {% for tipo in tipos %}<option value="{{ tipo.cd_valor }}">{{ tipo.ds_valor }}</option>{% endfor %}
          </select>
        </td>
        <td><input name="new_council" maxlength="20" placeholder="CRM, CRBM..." required></td>
        <td><select name="new_active"><option value="true">Ativo</option></select></td>
      </tr>
    </template>
    {% include "components/table_pager.html" %}
  </form>
{% endblock %}
